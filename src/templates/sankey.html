<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card .label {
            font-size: 0.9em;
            color: #6c757d;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: 700;
            color: #212529;
        }

        .stat-card.positive .value {
            color: #28a745;
        }

        .stat-card.negative .value {
            color: #dc3545;
        }

        #sankey-chart {
            padding: 30px;
            min-height: 600px;
        }

        .footer {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
            text-align: center;
            color: #6c757d;
            font-size: 0.9em;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            #sankey-chart {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{TITLE}}</h1>
            <p>{{SUBTITLE}}</p>
        </div>

        <div class="stats">
            {{STATS}}
        </div>

        <div id="sankey-chart"></div>

        <div class="footer">
            Generated on {{TIMESTAMP}} |
            <a href="https://github.com/yourusername/ynab-sankey" target="_blank">GitHub</a>
        </div>
    </div>

    <script>
        // Embedded Sankey data
        const sankeyData = {{SANKEY_DATA}};

        // Prepare Plotly data
        const data = [{
            type: 'sankey',
            orientation: 'h',
            arrangement: 'snap',
            node: {
                pad: 15,
                thickness: 20,
                line: {
                    color: 'white',
                    width: 2
                },
                label: sankeyData.nodes.map(n => n.label),
                color: sankeyData.nodes.map(n => n.color),
                hovertemplate: '<b>%{label}</b><br>Total: $%{value:,.2f}<extra></extra>'
            },
            link: {
                source: sankeyData.links.map(l => l.source),
                target: sankeyData.links.map(l => l.target),
                value: sankeyData.links.map(l => l.value),
                customdata: sankeyData.links.map(l => l.customdata),
                hovertemplate: '<b>%{source.label}</b> → <b>%{target.label}</b><br>' +
                               'Amount: $%{value:,.2f}<br>' +
                               'Percentage: %{customdata.percentage}%' +
                               '<extra></extra>',
                color: 'rgba(0, 0, 0, 0.2)'
            }
        }];

        const layout = {
            font: {
                family: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
                size: 14
            },
            margin: {
                l: 20,
                r: 20,
                t: 20,
                b: 20
            },
            paper_bgcolor: 'white',
            plot_bgcolor: 'white'
        };

        const config = {
            responsive: true,
            displayModeBar: true,
            displaylogo: false,
            modeBarButtonsToRemove: ['lasso2d', 'select2d'],
            toImageButtonOptions: {
                format: 'png',
                filename: '{{FILENAME}}',
                height: 800,
                width: 1200,
                scale: 2
            }
        };

        // Render the chart
        Plotly.newPlot('sankey-chart', data, layout, config);

        // Make chart responsive
        window.addEventListener('resize', () => {
            Plotly.Plots.resize('sankey-chart');
        });
    </script>
</body>
</html>
